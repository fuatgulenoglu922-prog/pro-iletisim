# Build Version: 6.0.0 (SHA-1 Reporting)
name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Capacitor and Build APK
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          
          # SHA-1 RAPORU (BU KODU FIREBASE'E EKLEYECEĞİZ)
          echo "--- GOOGLE GIRIS ICIN SHA-1 KODUNUZ ASAGIDADIR ---"
          keytool -list -v -keystore ~/.android/debug.keystore -alias androiddebugkey -storepass android -keypass android | grep SHA1
          echo "--- KODU KOPYALAYIP FIREBASE'E YAPISTIRIN ---"

          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pro-Iletisim-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
