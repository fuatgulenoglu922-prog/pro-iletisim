# Build Version: 6.1.0 (Fixed SHA-1 Reporting Order)
name: Build Android APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Setup Capacitor and Build APK
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi
          npx cap sync android
          
          cd android
          chmod +x gradlew
          
          # Önce APK'yı oluşturuyoruz (bu işlem debug keystore'u yaratır)
          ./gradlew assembleDebug --no-daemon

          # SHA-1 RAPORUNU YAZDIR (FIREBASE ICIN)
          echo "--- GOOGLE GIRIS ICIN SHA-1 KODUNUZ ASAGIDADIR ---"
          ./gradlew signingReport | grep -A 20 "Variant: debug" || true
          echo "--- YUKARIDAKI SHA1 KODUNU FIREBASE'E YAPISTIRIN ---"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pro-Iletisim-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
